name: Weekly PR Summary with DeepSeek

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyGithub requests

      - name: Generate PR summary with DeepSeek
        env:
          GITHUB_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TARGET_REPO: "RocketChat/Rocket.Chat"
        run: python .github/scripts/deepseek_pr_summary.py
      - name: Send to Rocket.Chat
        env:
          ROCKETCHAT_WEBHOOK: ${{ secrets.ROCKETCHAT_WEBHOOK }}
        run: python .github/scripts/send_to_rocketchat.py
